services:
  app:
    restart: always
    build: .
    ports:
      - 7822:8080
    env_file:
      - path: .env
        required: false
    environment:
       - DATABASE_URL=postgresql://db:7422/db?user=user1&password=${POSTGRES_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
        restart: true
    volumes:
      - ./images:/images
  db:
    restart: always
    image: postgres:latest
    shm_size: 500mb
    ports:
      - 7422:5432
    env_file:
      - path: .env
        required: false
    environment:
      - POSTGRES_HOST_AUTH_METHOD=scram-sha-256
      - POSTGRES_INITDB_ARGS=--auth-host=scram-sha-256
      - POSTGRES_USER=user1
      - POSTGRES_DB=db
    volumes:
      - db:/var/lib/postgresql/data
volumes:
  db:
